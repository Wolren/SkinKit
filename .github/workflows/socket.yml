name: Socket

on:
  pull_request:
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '**/pyproject.toml'
      - '**/requirements*.txt'

jobs:
  socket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: socketdev/socket-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
